name: fcheck

description: Code quality analysis for Flutter and Dart projects with architecture, maintainability, and safety checks, deterministic reports, and compliance scoring.

version: 1.1.0

repository: https://github.com/vteam-com/fCheck

topics:
  - analysis
  - architecture
  - code-style
  - lint
  - compliance

false_secrets:
  - /test/analyzer_engine_test.dart

executables:
  fcheck:

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  analyzer: ^11.0.0
  args: ^2.7.0
  glob: ^2.1.3
  path: ^1.9.1
  yaml: ^3.1.3

dev_dependencies:
  test: ^1.30.0
  lints: ^6.1.0

dependency_overrides:
  analyzer: ^11.0.0
