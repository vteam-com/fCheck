<style>  
  .layerBackground { 
    fill: rgba(52, 58, 64, 0.08);     
  }

  .layerBackground:hover { 
    fill: PaleGoldenRod ;
    transition: all 0.1s ease-in-out; 
  }

  .layerBackgroundVirtualFolder { 
    fill: rgba(52, 58, 64, 0.05); 
    stroke: gray; 
    stroke-width: 1; 
    stroke-dasharray: 4,4; 
  }

  .layerBackgroundVirtualFolder:hover { 
    fill: PaleGoldenRod ;
    stroke: gray; 
    stroke-width: 0; 
    stroke-dasharray: 4,4;
    transition: all 0.1s ease-in-out; 
  }
  
  .layerTitle,
  .layerTitleSmall { 
    fill: black; 
    font-weight: bold; 
    text-anchor: middle; 
    filter: url(#outlineWhite); 
  }

  .layerTitle { 
    font-size: 16px; 
  }

  .layerTitleSmall { 
    font-size: 12px; 
  }
  
  /* File node styles */
  .fileNode { 
    fill: white; 
    stroke: gray; 
    stroke-width: 0.5; 
    rx: 6; 
    ry: 6;    
  }
  
  .fileNode:hover {     
    fill: PaleGoldenRod;
    transition: all 0.1s ease-in-out; 
  }

  .fileNodeWarning,
  .layerBackgroundWarning,
  .layerBackgroundVirtualFolderWarning {
    fill: url(#warningNodeGradient);
    fill-opacity: 0.68;
  }

  .fileNodeError,
  .layerBackgroundError,
  .layerBackgroundVirtualFolderError {
    fill: url(#errorNodeGradient);
    fill-opacity: 0.72;
  }

  .textNormal,
  .textSmall { 
    fill: #212529; 
    font-weight: 900; 
    text-anchor: middle; 
    dominant-baseline: middle; 
    filter: url(#outlineWhite); 
  }

  .textNormal { 
    font-size: 14px; 
  }

  .textSmall { 
    font-size: 12px; 
  }

  /* Unified edge styles */
  .edge { 
    fill: none; 
    stroke: url(#horizontalGradient); 
    stroke-width: 1; 
    opacity: 0.5;
    cursor: pointer;
    transition: all 0.1s ease-in-out; 
  }


  .edge:hover { 
    stroke: url(#horizontalGradient); 
    stroke-width: 3; 
    opacity: 1.0; 
  }

  .edgeFlat {
    stroke: url(#horizontalGradient);
    stroke-width: 1.5;
    stroke-linecap: round;
    opacity: 0.95;
  }

  .edgeFlat:hover {
    stroke: url(#horizontalGradient);
    stroke-width: 3;
    opacity: 1.0;
  }
  
  .edgeVertical { 
    fill: none; 
    stroke: url(#verticalGradient); 
    stroke-width: 1; 
    opacity: 0.5; 
    cursor: pointer;
    transition: all 0.1s ease-in-out; 
  }
  
  .edgeVertical:hover { 
    stroke: url(#verticalGradient); 
    stroke-width: 3; 
    opacity: 1.0; 
  }
  
  /* Special edge styles */
  .cycleEdge { 
    fill: none; 
    stroke: red; 
    stroke-width: 5; 
    opacity: 0.9; 
    cursor: pointer;
  }
  
  .warningEdge { 
    fill: none; 
    stroke: orange; 
    stroke-width: 3; 
    opacity: 0.9; 
    cursor: pointer;
    transition: all 0.1s ease-in-out; 
  }
  
  .warningEdge:hover { 
    fill: none; 
    stroke: orange; 
    stroke-width: 5; 
    opacity: 1.0; 
  }
  
  /* Unified badge styles with pointer cursor */
  .badge { 
    font-size: 10px; 
    font-weight: bold; 
    fill: white; 
    text-anchor: middle; 
    dominant-baseline: middle; 
    cursor: pointer; 
    transition: all 0.1s ease-in-out; 
  }
  
  .badge:hover { 
    opacity: 0.8; 
  }
  
  /* Special styles */
  .folderTitleLayer { 
    pointer-events: none; 
    isolation: isolate; 
  }
</style>
